<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor di Testo</title>
    <link rel="stylesheet" href="Foglio.css">
    <script src="Foglio.js" defer></script>
</head>
<body>
    <div class="opening" id="la-tua-storia">
        <h1>La tua storia</h1>
    </div>
    
    <div class="controls">
        <label for="font-select">Seleziona un font:</label>
        <select id="font-select" name="font" onchange="changeFont(this.value)">
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
        </select>

        <label for="font-size">Dimensione Font:</label>
        <input type="number" id="font-size" value="16" min="8" max="72" onchange="changeFontSize(this.value)">

        <label for="color-select">Colore testo:</label>
        <input type="color" id="color-select" value="#000000" onchange="changeTextColor(this.value)">

        <label for="title-color-select">Colore titolo:</label>
        <input type="color" id="title-color-select" value="#ffffff" onchange="changeTitleColor(this.value)">
    </div>

    <div class="headline">
        <label for="headline">Titolo:</label>
        <input type="text" id="title" name="title">
    </div>

    <div class="text-area">
        <label for="text-area">Testo:</label>
        <textarea id="text-area" oninput="updateCharacterCount()" style="width: 100%; height: 60vh; font-size: 16px; font-family: 'Arial', sans-serif;"></textarea>
        <p>Numero caratteri: <span id="output">0</span></p>
        <button onclick="downloadTextFile()">Scarica la tua Storia</button>
    </div>
</body>
</html>
